<ion-content>
  <div class="register-shell">
    <section class="register-brand">
      <ion-icon name="leaf-outline"></ion-icon>
      <h1>VerdeVegan</h1>
      <p>Cria o teu perfil para finalizar pedidos, guardar moradas e acumular pontos.</p>
    </section>

    <form [formGroup]="form" (ngSubmit)="submit()" class="register-form">
      <button class="login-link" type="button" routerLink="/login">
        <ion-icon name="chevron-back-outline"></ion-icon>
        Entrar
      </button>

      <h2>Criar conta</h2>
      <p class="form-subtitle">Guarda as tuas preferências e acompanha os teus pedidos num só sítio.</p>

      <ion-item>
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input label="Nome" labelPlacement="stacked" formControlName="name" placeholder="Inês Marinho"></ion-input>
      </ion-item>

      <ion-item>
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input label="Email" labelPlacement="stacked" type="email" formControlName="email" placeholder="ines@verdevegan.pt"></ion-input>
      </ion-item>

      <ion-item>
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input
          label="Palavra-passe"
          labelPlacement="stacked"
          type="password"
          formControlName="password"
          placeholder="Mínimo 6 caracteres"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-icon name="nutrition-outline" slot="start"></ion-icon>
        <ion-select label="Tipo de dieta" labelPlacement="stacked" formControlName="diet" interface="popover">
          <ion-select-option value="Vegan">Vegan</ion-select-option>
          <ion-select-option value="Vegetariana">Vegetariana</ion-select-option>
          <ion-select-option value="Flexitariana">Flexitariana</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item class="textarea-item">
        <ion-icon name="warning-outline" slot="start"></ion-icon>
        <ion-textarea
          label="Alergénios a evitar"
          labelPlacement="stacked"
          formControlName="allergies"
          placeholder="Ex.: frutos secos, soja"
          autoGrow="true"
        ></ion-textarea>
      </ion-item>

      <ion-button expand="block" type="submit" [disabled]="form.invalid">
        <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
        Criar conta
      </ion-button>
      <p class="login-prompt">Já tens conta? <button type="button" routerLink="/login">Entrar</button></p>
    </form>
  </div>
</ion-content>
