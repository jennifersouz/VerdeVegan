<ion-content [fullscreen]="true" class="login-content">

  <div class="login-shell">

    <img src="assets/imagens/verdevegan.jpg" alt="VerdeVegan" class="brand-logo">

    <section class="login-card">

      <button type="button" class="close-button" (click)="fecharLogin()" aria-label="Fechar">
        <ion-icon name="close-outline"></ion-icon>
      </button>

      <h1>Entrar</h1>

      <form [formGroup]="loginForm" (ngSubmit)="entrar()">

        <div class="campo-linha">
          <ion-icon name="mail-outline"></ion-icon>

          <label>
            <span>Email</span>
            <input
              type="email"
              placeholder="exemplo@email.com"
              formControlName="email">
          </label>
        </div>

        <ion-text color="danger" *ngIf="(formSubmetido || recuperacaoSubmetida) && loginForm.get('email')?.invalid">
          <p class="erro">Introduz um email válido.</p>
        </ion-text>

        <div class="campo-linha">
          <ion-icon name="lock-closed-outline"></ion-icon>

          <label>
            <span>Password</span>
            <input
              [type]="mostrarPalavraPasse ? 'text' : 'password'"
              placeholder="Mínimo 8 caracteres"
              formControlName="palavraPasse">
          </label>

          <button type="button" class="eye-button" (click)="alternarVisibilidadePalavraPasse()">
            <ion-icon [name]="mostrarPalavraPasse ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>

        <ion-text color="danger" *ngIf="formSubmetido && loginForm.get('palavraPasse')?.invalid">
          <p class="erro">A palavra-passe deve ter pelo menos 8 caracteres.</p>
        </ion-text>

        <ion-text color="danger" *ngIf="erroLogin">
          <p class="erro">Email ou palavra-passe incorretos.</p>
        </ion-text>

        <ion-text color="danger" *ngIf="erroRecuperacao">
          <p class="erro">Não foi possível enviar o email de recuperação. Tenta novamente.</p>
        </ion-text>

        <ion-text color="success" *ngIf="mensagemRecuperacao">
          <p class="erro">{{ mensagemRecuperacao }}</p>
        </ion-text>

        <button type="button" class="forgot-link" (click)="esqueciPalavraPasse()">
          Recuperar palavra-passe
        </button>

        <button type="submit" class="botao-principal">
          <ion-icon name="log-in-outline"></ion-icon>
          <span>ENTRAR</span>
        </button>

      </form>

      <button type="button" class="registo-link" (click)="irParaRegisto()">
        CRIAR CONTA
      </button>

    </section>

  </div>

</ion-content>
