<ion-content>
  <div class="auth-shell">
    <section class="brand-panel">
      <ion-icon name="leaf-outline"></ion-icon>
      <h1>VerdeVegan</h1>
      <p>Comida vegetariana à medida, com pontos, personalização e acompanhamento do pedido.</p>
    </section>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <h2>Entrar</h2>
      <ion-item>
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input label="Email" labelPlacement="stacked" type="email" formControlName="email"></ion-input>
      </ion-item>
      <ion-item>
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input label="Password" labelPlacement="stacked" [type]="showPassword ? 'text' : 'password'" formControlName="password"></ion-input>
        <button
          class="password-toggle"
          type="button"
          slot="end"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="showPassword ? 'Esconder palavra-passe' : 'Mostrar palavra-passe'"
        >
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </button>
      </ion-item>
      <button class="forgot-password" type="button" (click)="recoverPassword()">Recuperar palavra-passe</button>
      <p class="auth-success" *ngIf="recoveryMessage">{{ recoveryMessage }}</p>
      <p class="auth-error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <ion-button expand="block" type="submit" [disabled]="form.invalid">
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Entrar
      </ion-button>
      <ion-button fill="clear" expand="block" routerLink="/registo">Criar conta</ion-button>
    </form>
  </div>
</ion-content>
