<ion-content class="checkout-pontos-page">

  <div class="page-wrapper">

    <div class="logo-area">
      <img src="assets/logo-verdevegan.png" alt="VerdeVegan" />
    </div>

    <a class="back-link" routerLink="/tabs/carrinho">
      <ion-icon name="chevron-back-outline"></ion-icon>
      Carrinho
    </a>

    <div class="checkout-progress">
      <div
        class="progress-step"
        *ngFor="let etapa of etapasCheckout"
        [class.ativa]="etapa.numero === etapaAtual"
        [class.concluida]="etapa.numero < etapaAtual">
        <div class="bolinha">
          <ion-icon name="checkmark-outline" *ngIf="etapa.numero < etapaAtual"></ion-icon>
          <span *ngIf="etapa.numero >= etapaAtual">{{ etapa.numero }}</span>
        </div>
      </div>
    </div>
    <p class="etapa-atual-label">{{ obterNomeEtapaAtual() }}</p>

    <section class="page-title">
      <h1>Descontos e Pontos</h1>
      <p>Aplica o teu código ou usa os teus pontos</p>
    </section>

    <section class="form-section">
      <label>Código de desconto</label>

      <div class="input-row">
        <div class="input-box">
          <ion-icon name="ticket-outline"></ion-icon>
          <input
            type="text"
            placeholder="Insere o código"
            [(ngModel)]="codigoDesconto"
          />
        </div>

        <button class="small-button">
          Aplicar
        </button>
      </div>
    </section>

    <section class="form-section">
      <label>Pontos disponíveis: {{ pontosDisponiveis }} pontos</label>

      <div class="input-row">
        <div class="input-box">
          <input
            type="number"
            [(ngModel)]="pontosUsados"
          />
        </div>

        <button class="small-button" (click)="usarTodosPontos()">
          Usar Todos
        </button>
      </div>
    </section>

    <section class="summary-card">
      <span>Total</span>
      <strong>{{ totalFinal.toFixed(2) }}€</strong>
    </section>

    <ion-button expand="block" routerLink="/checkout-morada">
      Continuar
    </ion-button>

  </div>

</ion-content>
