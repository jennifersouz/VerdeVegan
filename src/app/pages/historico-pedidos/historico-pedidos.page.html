<ion-content [fullscreen]="true" class="historico-pedidos-content" scrollY="true">

  <div class="historico-pedidos-container">

    <header class="historico-topo">
      <h1>Histórico de Pedidos</h1>

      <button type="button" (click)="verTodos()">
        Ver todos
        <ion-icon name="chevron-forward-outline"></ion-icon>
      </button>
    </header>

    <div *ngIf="carregando" class="historico-loading">
      <ion-spinner name="crescent"></ion-spinner>
    </div>

    <section class="historico-lista" *ngIf="!carregando">
      <article class="pedido-linha" *ngFor="let pedido of pedidos">
        <strong class="pedido-id">{{ pedido.id }}</strong>

        <strong class="pedido-data">{{ textoDataItens(pedido) }}</strong>

        <strong class="pedido-total">{{ pedido.total.toFixed(2).replace('.', ',') }}€</strong>

        <button type="button" class="detalhes-button" (click)="verDetalhes(pedido)">
          Ver detalhes
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </button>
      </article>
    </section>

  </div>

</ion-content>
