<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-back-button defaultHref="/perfil"></ion-back-button></ion-buttons>
    <ion-title>Requisitos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-shell">
    <ion-card>
      <ion-card-header>
        <ion-card-title>VerdeVegan</ion-card-title>
        <ion-card-subtitle>Checklist funcional para a avaliação heurística</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-list>
          <ion-item *ngFor="let item of minimum">
            <ion-icon name="checkmark-circle-outline" color="primary" slot="start"></ion-icon>
            <ion-label>{{ item }}</ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
