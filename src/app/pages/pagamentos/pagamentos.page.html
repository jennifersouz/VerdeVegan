<ion-content [fullscreen]="true" class="pagamentos-content" scrollY="true">

  <div *ngIf="carregando" class="pagamentos-loading">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Carregando métodos...</p>
  </div>

  <div class="pagamentos-container" *ngIf="!carregando">

    <header class="topo">
      <button type="button" class="voltar-button" (click)="voltar()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </button>

      <div>
        <h1>Métodos de pagamento</h1>
        <p>Gere os teus cartões guardados</p>
      </div>
    </header>

    <section class="lista-pagamentos">

      <article
        class="pagamento-card"
        *ngFor="let pagamento of pagamentos"
        [class.principal]="pagamento.principal">

        <div class="card-topo">
          <div>
            <strong>{{ pagamento.tipo }}</strong>
            <span *ngIf="pagamento.principal">Principal</span>
          </div>

          <div class="card-acoes">
            <button type="button" (click)="editarPagamento(pagamento)">
              <ion-icon name="create-outline"></ion-icon>
            </button>

            <button type="button" (click)="removerPagamento(pagamento.id)">
              <ion-icon name="trash-outline"></ion-icon>
            </button>
          </div>
        </div>

        <p class="cartao-numero">{{ obterMascaraCartao(pagamento) }}</p>
        <p class="cartao-validade" *ngIf="pagamento.validade !== 'N/A'">Válido até {{ pagamento.validade }}</p>

        <div class="card-footer">
          <button
            type="button"
            *ngIf="!pagamento.principal"
            (click)="definirPrincipal(pagamento.id)">
            Tornar principal
          </button>
        </div>

      </article>

      <button type="button" class="adicionar-card" (click)="abrirFormulario()">
        <ion-icon name="add-outline"></ion-icon>
        Adicionar novo cartão
      </button>

    </section>

  </div>

</ion-content>

<div class="form-overlay" *ngIf="formularioAberto" (click)="fecharFormulario()">

  <div class="form-modal" (click)="$event.stopPropagation()">

    <div class="modal-handle"></div>

    <h2>{{ editandoId ? 'Editar cartão' : 'Novo cartão' }}</h2>

    <!-- Tipo -->
    <div class="campo-grupo">
      <label>Tipo *</label>
      <select [(ngModel)]="novoPagamento.tipo">
        <option value="Visa">Visa</option>
        <option value="Mastercard">Mastercard</option>
        <option value="MB Way">MB Way</option>
      </select>
    </div>

    <!-- Titular — oculto para MB Way -->
    <div class="campo-grupo" *ngIf="novoPagamento.tipo !== 'MB Way'">
      <label>Titular *</label>
      <input
        type="text"
        placeholder="Nome do titular"
        [(ngModel)]="novoPagamento.titular"
        [class.invalido]="formSubmetido && (!novoPagamento.titular.trim() || novoPagamento.titular.trim().length < 2)">
    </div>

    <!-- Últimos dígitos / número MB Way -->
    <div class="campo-grupo">
      <label>{{ novoPagamento.tipo === 'MB Way' ? 'Número MB Way *' : 'Últimos 4 dígitos *' }}</label>
      <input
        type="tel"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="9"
        [placeholder]="novoPagamento.tipo === 'MB Way' ? 'Ex: 912345678' : 'Ex: 1234'"
        [(ngModel)]="novoPagamento.ultimosDigitos"
        (input)="filtrarApenasNumerosPagamento()"
        [class.invalido]="formSubmetido && (
          novoPagamento.tipo === 'MB Way'
            ? !telefoneValido(novoPagamento.ultimosDigitos)
            : !ultimosDigitosValidos(novoPagamento.ultimosDigitos)
        )">
    </div>

    <!-- Validade — oculta para MB Way -->
    <div class="campo-grupo" *ngIf="novoPagamento.tipo !== 'MB Way'">
      <label>Validade *</label>
      <input
        type="text"
        placeholder="Ex: 08/2028"
        maxlength="7"
        [(ngModel)]="novoPagamento.validade"
        [class.invalido]="formSubmetido && !validadeValida(novoPagamento.validade)">
    </div>

    <label class="checkbox-linha">
      <input type="checkbox" [(ngModel)]="novoPagamento.principal">
      Definir como principal
    </label>

    <!-- Mensagem de erro -->
    <p class="mensagem-erro" *ngIf="mensagemErro">{{ mensagemErro }}</p>

    <div class="modal-botoes">
      <button type="button" class="btn-cancelar" (click)="fecharFormulario()">
        Cancelar
      </button>

      <button type="button" class="btn-guardar" (click)="guardarPagamento()">
        Guardar
      </button>
    </div>

  </div>

</div>
