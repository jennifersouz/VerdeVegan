<ion-content [fullscreen]="true" class="pagamentos-content" scrollY="true">

  <div *ngIf="carregando" class="pagamentos-loading">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Carregando métodos...</p>
  </div>

  <div class="pagamentos-container" *ngIf="!carregando">

    <header class="topo">
      <button type="button" class="voltar-button" (click)="voltar()">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </button>

      <h1>Métodos de Pagamento</h1>
    </header>

    <section class="lista-pagamentos">

      <article
        class="pagamento-card"
        *ngFor="let pagamento of pagamentos"
        [class.principal]="pagamento.principal">

        <div class="card-topo">
          <div class="cartao-bandeira" [class.visa]="obterBandeira(pagamento) === 'visa'">
            <span *ngIf="obterBandeira(pagamento) === 'mastercard'" class="mc-red"></span>
            <span *ngIf="obterBandeira(pagamento) === 'mastercard'" class="mc-yellow"></span>
            <strong *ngIf="obterBandeira(pagamento) === 'visa'">VISA</strong>
          </div>

          <div class="card-acoes">
            <button type="button" (click)="editarPagamento(pagamento)">
              <ion-icon name="create-outline"></ion-icon>
            </button>

            <button type="button" (click)="removerPagamento(pagamento.id)">
              <ion-icon name="trash-outline"></ion-icon>
            </button>
          </div>
        </div>

        <p class="cartao-numero">{{ obterMascaraCartao(pagamento) }}</p>
        <p class="cartao-validade" *ngIf="pagamento.validade !== 'N/A'">Válido até {{ pagamento.validade }}</p>

        <span class="principal-badge" *ngIf="pagamento.principal">
          Cartão principal
        </span>

        <button
          type="button"
          class="tornar-principal"
          *ngIf="!pagamento.principal"
          (click)="definirPrincipal(pagamento.id)">
          Tornar principal
        </button>

      </article>

      <button type="button" class="adicionar-card" (click)="abrirFormulario()">
        <ion-icon name="add-outline"></ion-icon>
        Adicionar novo cartão
      </button>

    </section>

  </div>

</ion-content>

<div class="form-overlay" *ngIf="formularioAberto" (click)="fecharFormulario()">

  <div class="form-modal" (click)="$event.stopPropagation()">

    <button type="button" class="modal-close" (click)="fecharFormulario()">
      <ion-icon name="close-outline"></ion-icon>
    </button>

    <h2>{{ editandoId ? 'Editar cartão' : 'Adicionar novo cartão' }}</h2>

    <!-- Titular — oculto para MB Way -->
    <div class="campo-grupo" *ngIf="novoPagamento.tipo !== 'MB Way'">
      <label>Nome do titular</label>
      <input
        type="text"
        placeholder=""
        [(ngModel)]="novoPagamento.titular"
        [class.invalido]="formSubmetido && (!novoPagamento.titular.trim() || novoPagamento.titular.trim().length < 2)">
    </div>

    <div class="campo-grupo">
      <label>Número do cartão</label>
      <input
        type="text"
        inputmode="numeric"
        placeholder=""
        maxlength="19"
        [(ngModel)]="novoPagamento.numeroCartao"
        (keydown)="bloquearNaoNumerico($event)"
        (paste)="colarApenasNumeros($event, 'numeroCartao', 19)"
        (input)="normalizarNumeroCartao()"
        [class.invalido]="formSubmetido && !numeroCartaoValido(novoPagamento.numeroCartao || '')">
    </div>

    <div class="campo-grupo" *ngIf="novoPagamento.tipo !== 'MB Way'">
      <label>Data de validade</label>
      <input
        type="text"
        placeholder="MM/AAAA"
        maxlength="7"
        [(ngModel)]="novoPagamento.validade"
        [class.invalido]="formSubmetido && !validadeValida(novoPagamento.validade)">
    </div>

    <div class="campo-grupo">
      <label>CVV</label>
      <input
        type="text"
        inputmode="numeric"
        placeholder=""
        maxlength="4"
        [(ngModel)]="novoPagamento.cvv"
        (keydown)="bloquearNaoNumerico($event)"
        (paste)="colarApenasNumeros($event, 'cvv', 4)"
        (input)="normalizarCvv()"
        [class.invalido]="formSubmetido && !cvvValido(novoPagamento.cvv || '')">
    </div>

    <div class="campo-grupo">
      <label>Tipo de cartão</label>
      <div class="tipo-cartao-select" [class.aberto]="tipoCartaoAberto">
        <button type="button" class="tipo-cartao-trigger" (click)="alternarTipoCartao()">
          <span>{{ novoPagamento.tipo }}</span>
          <ion-icon name="chevron-down-outline"></ion-icon>
        </button>

        <div class="tipo-cartao-opcoes" *ngIf="tipoCartaoAberto">
          <button type="button" (click)="selecionarTipoCartao('Mastercard')">
            <ion-icon name="checkmark-outline" *ngIf="novoPagamento.tipo === 'Mastercard'"></ion-icon>
            <span>Mastercard</span>
          </button>

          <button type="button" (click)="selecionarTipoCartao('Visa')">
            <ion-icon name="checkmark-outline" *ngIf="novoPagamento.tipo === 'Visa'"></ion-icon>
            <span>Visa</span>
          </button>
        </div>
      </div>
    </div>

    <label class="checkbox-linha">
      <input type="checkbox" [(ngModel)]="novoPagamento.principal">
      <span class="checkbox-visual"></span>
      <span>Definir como principal</span>
    </label>

    <!-- Mensagem de erro -->
    <p class="mensagem-erro" *ngIf="mensagemErro">{{ mensagemErro }}</p>

    <button type="button" class="btn-guardar" (click)="guardarPagamento()">
      Guardar cartão
    </button>

  </div>

</div>
