<ion-content class="checkout-morada-page">

  <div class="page-wrapper">

    <div class="logo-area">
      <img src="assets/logo-verdevegan.png" alt="VerdeVegan" />
    </div>

    <a class="back-link" routerLink="/checkout-pontos">
      <ion-icon name="chevron-back-outline"></ion-icon>
      Carrinho
    </a>

    <div class="checkout-progress">
      <div
        class="progress-step"
        *ngFor="let etapa of etapasCheckout"
        [class.ativa]="etapa.numero === etapaAtual"
        [class.concluida]="etapa.numero < etapaAtual">
        <div class="bolinha">
          <ion-icon name="checkmark-outline" *ngIf="etapa.numero < etapaAtual"></ion-icon>
          <span *ngIf="etapa.numero >= etapaAtual">{{ etapa.numero }}</span>
        </div>
      </div>
    </div>
    <p class="etapa-atual-label">{{ obterNomeEtapaAtual() }}</p>

    <section class="page-title">
      <h1>Morada de entrega</h1>
      <p>Seleciona ou adiciona uma morada</p>
    </section>

    <section class="address-list">

      <button
        class="address-card"
        [class.selected]="moradaSelecionada === 'casa'"
        (click)="selecionarMorada('casa')"
      >
        <ion-icon name="location-outline"></ion-icon>

        <div>
          <h2>Casa</h2>
          <p>Rua de Santa Catarina, 852</p>
          <p>4000-443 Porto</p>
        </div>
      </button>

      <button
        class="address-card"
        [class.selected]="moradaSelecionada === 'trabalho'"
        (click)="selecionarMorada('trabalho')"
      >
        <ion-icon name="location-outline"></ion-icon>

        <div>
          <h2>Trabalho</h2>
          <p>R. Manuel Pinto de Azevedo, 626</p>
          <p>4100-320 Porto</p>
        </div>
      </button>

      <button class="add-address-button">
        + Adicionar nova morada
      </button>

    </section>

    <ion-button expand="block" routerLink="/checkout-pagamento">
      Continuar
    </ion-button>

  </div>

</ion-content>
