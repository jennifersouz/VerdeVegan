<ion-content class="pedidos-page">

  <div class="page-wrapper">

    <h1>Os meus pedidos</h1>

    <div class="empty-state" *ngIf="pedidos.length === 0">
      <h2>Ainda não tens pedidos</h2>
      <p>Quando confirmares uma encomenda, ela aparece aqui.</p>
    </div>

    <div
      class="pedido-card"
      *ngFor="let pedido of pedidos"
      routerLink="/detalhe-pedido"
    >
      <div>
        <h2>{{ pedido.nome }}</h2>
        <p>{{ pedido.data }} · {{ pedido.hora }} · {{ pedido.itens }} itens</p>
        <strong>{{ pedido.total.toFixed(2) }} €</strong>
      </div>

      <span class="estado">{{ pedido.estado }}</span>
    </div>

  </div>

</ion-content>
