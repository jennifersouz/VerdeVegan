<ion-content [fullscreen]="true" class="pedidos-content" scrollY="true">

  <div class="pedidos-container">

    <section class="empty-state" *ngIf="pedidos.length === 0">

      <h1>Os meus pedidos</h1>

      <div class="empty-image-area">
        <img
          src="assets/img/box.png"
          alt="Sem pedidos"
          class="empty-image">
      </div>

      <h2>Ainda sem pedidos</h2>

      <p>
        Quando fizeres o teu<br>
        primeiro pedido ele vai<br>
        aparecer aqui.<br>
        Que tal explorar o menu?
      </p>

      <button type="button" class="menu-button" (click)="irParaMenu()">
        Ir para o menu
      </button>

    </section>

    <section class="pedidos-lista" *ngIf="pedidos.length > 0">

      <header class="pedidos-topo">
        <h1>Os meus pedidos</h1>
        <p>{{ pedidos.length }} pedidos encontrados</p>
      </header>

      <article
        class="pedido-card"
        *ngFor="let pedido of pedidos"
        (click)="abrirPedido(pedido.id)">

        <div>
          <h2>Pedido #{{ pedido.id }}</h2>
          <p>{{ pedido.data }}</p>
        </div>

        <div class="pedido-info">
          <span>{{ pedido.estado }}</span>
          <strong>{{ pedido.total | number:'1.2-2' }} €</strong>
        </div>

      </article>

    </section>

  </div>

</ion-content>
