<section class="secao tipos-menu-area">
  <h2>Tipo</h2>

  <div class="tipos-scroll">

    <button
      type="button"
      class="tipo-chip"
      [class.ativa]="tipoSelecionado === 'Todos'"
      (click)="selecionarTipo('Todos')">
      Todos
    </button>

    <button
      type="button"
      class="tipo-chip"
      [class.ativa]="tipoSelecionado === 'Refeições'"
      (click)="selecionarTipo('Refeições')">
      🍽️ Refeições
    </button>

    <button
      type="button"
      class="tipo-chip"
      [class.ativa]="tipoSelecionado === 'Bebidas'"
      (click)="selecionarTipo('Bebidas')">
      🥤 Bebidas
    </button>

    <button
      type="button"
      class="tipo-chip"
      [class.ativa]="tipoSelecionado === 'Sobremesas'"
      (click)="selecionarTipo('Sobremesas')">
      🍰 Sobremesas
    </button>

  </div>
</section>
