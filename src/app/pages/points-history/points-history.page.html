<ion-content>
  <main class="points-page">
    <button class="points-back" type="button" routerLink="/perfil">
        <ion-icon name="chevron-back-outline"></ion-icon>
        Perfil
      </button>

    <header class="points-header">
      <h1>Histórico de pontos</h1>
      <p>
        Os pontos são adicionados automaticamente após cada compra. Pode levar algum tempo para que os pontos apareçam na app.
      </p>
    </header>

    <section class="points-list">
      <article class="points-row" *ngFor="let entry of entries$ | async" [class.redeemed]="entry.points < 0">
        <ion-icon [name]="entry.points < 0 ? 'caret-down-outline' : 'caret-up-outline'"></ion-icon>
        <div>
          <strong>{{ entry.type }}</strong>
          <span>{{ entry.date }}</span>
        </div>
        <em>{{ entry.points > 0 ? '+' : '' }}{{ entry.points }}</em>
      </article>
    </section>
  </main>
</ion-content>
