<ion-content [fullscreen]="true" class="perfil-content" scrollY="false">

  <div *ngIf="carregando" class="perfil-loading">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Carregando perfil...</p>
  </div>

  <div class="perfil-container" *ngIf="!carregando && perfil">

    <!-- Card principal -->
    <section class="perfil-card">

      <button type="button" class="editar-button" (click)="editarPerfil()">
        Editar
      </button>

      <div class="avatar-wrap">
        <div class="avatar" *ngIf="!perfil.fotoPerfil">
          {{ iniciais }}
        </div>
        <img
          class="avatar avatar-foto"
          *ngIf="perfil.fotoPerfil"
          [src]="perfil.fotoPerfil"
          alt="Foto de perfil">

        <button type="button" class="foto-button" aria-label="Alterar foto" (click)="escolherFoto(fotoInput)">
          <ion-icon name="pencil-outline"></ion-icon>
        </button>

        <input
          #fotoInput
          class="foto-input"
          type="file"
          accept="image/*"
          (change)="alterarFoto($event)">
      </div>

      <h1>{{ perfil.nome }}</h1>
      <p>{{ perfil.email }}</p>

    </section>

    <!-- Pontos -->
    <section class="pontos-card">
      <div>
        <strong>{{ perfil.pontos }} pontos</strong>
        <span>acumulados</span>
      </div>

      <button type="button" (click)="alternarHistoricoPontos()">
        Ver histórico
      </button>
    </section>

    <!-- Histórico de pontos -->
    <section class="historico-pontos" *ngIf="mostrarHistorico">

      <h2>Histórico de pontos</h2>

      <div class="historico-item" *ngFor="let item of historicoPontos">
        <div>
          <strong>{{ item.descricao }}</strong>
          <span>{{ item.data }}</span>
        </div>

        <p>+{{ item.pontos }}</p>
      </div>

    </section>

    <!-- Conta -->
    <section class="perfil-secao">

      <h2>CONTA</h2>

      <button type="button" class="opcao-linha" (click)="abrirMorada()">
        <div>
          <ion-icon name="location-outline"></ion-icon>
          <span>Moradas de entrega</span>
        </div>

        <ion-icon name="chevron-forward-outline"></ion-icon>
      </button>

      <button type="button" class="opcao-linha" (click)="abrirMetodoPagamento()">
        <div>
          <ion-icon name="card-outline"></ion-icon>
          <span>Métodos de pagamento</span>
        </div>

        <ion-icon name="chevron-forward-outline"></ion-icon>
      </button>

      <button type="button" class="opcao-linha" (click)="abrirHistoricoPedidos()">
        <div>
          <ion-icon name="refresh-outline"></ion-icon>
          <span>Histórico de Pedidos</span>
        </div>

        <ion-icon name="chevron-forward-outline"></ion-icon>
      </button>

    </section>

    <!-- Ajuda -->
    <section class="perfil-secao ajuda-secao">

      <button type="button" class="opcao-linha sair-linha" (click)="sair()">
        <div>
          <ion-icon name="log-out-outline"></ion-icon>
          <span>Sair</span>
        </div>
      </button>

    </section>

  </div>

  <div class="perfil-container perfil-guest-container" *ngIf="!carregando && !perfil">
    <section class="perfil-guest-card">
      <h1>Perfil</h1>
      <p>Entra na tua conta ou cria um perfil para veres pontos, moradas e histórico.</p>

      <div class="perfil-guest-actions">
        <button type="button" (click)="entrar()">Entrar</button>
        <span>|</span>
        <button type="button" (click)="criarPerfil()">Criar perfil</button>
      </div>
    </section>
  </div>

</ion-content>
