<ion-tabs>

  <ion-tab-bar slot="bottom">

    <ion-tab-button tab="inicio">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>INÍCIO</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="menu" [class.tab-selected]="menuAtivo">
      <ion-icon name="restaurant-outline"></ion-icon>
      <ion-label>MENU</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="carrinho">
      <span class="cart-icon-wrap">
        <ion-icon name="cart-outline"></ion-icon>
        <span class="cart-badge" *ngIf="quantidadeCarrinho > 0">
          {{ quantidadeCarrinho }}
        </span>
      </span>
      <ion-label>CARRINHO</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="pedidos">
      <ion-icon name="cube-outline"></ion-icon>
      <ion-label>PEDIDOS</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="perfil">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>PERFIL</ion-label>
    </ion-tab-button>

  </ion-tab-bar>

</ion-tabs>
